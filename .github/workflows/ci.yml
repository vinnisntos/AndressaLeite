name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore AndressaLeite.slnx

      - name: Build
        run: dotnet build AndressaLeite.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test AndressaLeite.Tests/AndressaLeite.Tests.csproj --no-restore --configuration Release --verbosity normal
